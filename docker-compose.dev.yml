services:
  postgres:
    image: postgres:16-alpine
    container_name: adminyzr-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adminyzr}
      POSTGRES_USER: ${POSTGRES_USER:-adminyzr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adminyzr_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adminyzr} -d ${POSTGRES_DB:-adminyzr}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: adminyzr-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data_dev:
  redis_data_dev:
